name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck, test & coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Generate Worker types
        run: |
          cp wrangler.example.jsonc wrangler.jsonc
          printf 'OURA_API_TOKEN=placeholder\nMCP_AUTH_PASSWORD=placeholder\n' > .dev.vars
          pnpm cf-typegen
        env:
          WRANGLER_SEND_METRICS: "false"

      - name: Typecheck worker
        run: npx tsc --noEmit

      - name: Typecheck scripts
        run: npx tsc --noEmit -p tsconfig.scripts.json

      - name: Test with coverage
        run: pnpm coverage
